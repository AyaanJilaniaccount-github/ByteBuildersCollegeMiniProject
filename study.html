<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Platform Pro</title>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div x-data="studyApp()" x-init="init()" class="w-full max-w-lg p-8 bg-slate-800 rounded-3xl border border-slate-700 shadow-2xl">
        
        <div class="flex justify-between items-center mb-8">
            <div>
                <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Progress</p>
                <p class="text-xl font-mono text-blue-400" x-text="(currentIndex + 1) + '/' + cards.length"></p>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Current XP</p>
                <p class="text-xl font-mono text-emerald-400" x-text="xp"></p>
            </div>
        </div>

        <div class="mb-10 text-center">
            <span class="px-3 py-1 rounded-full bg-slate-700 text-[10px] font-bold text-slate-300 uppercase" x-text="currentCard.category || 'General'"></span>
            <h2 class="text-3xl font-bold mt-4 leading-tight" x-text="currentCard.front"></h2>
        </div>

        <div class="space-y-4">
            <input 
                type="text" 
                x-model="userAnswer" 
                @keyup.enter="isEvaluated ? nextCard() : checkAnswer()"
                :disabled="isEvaluated"
                class="w-full bg-slate-900 border-2 rounded-2xl p-5 text-center text-lg focus:outline-none transition-all duration-300"
                :class="feedbackClass || 'border-slate-700 focus:border-blue-500'"
                placeholder="Type your answer..."
                autofocus
            >

            <template x-if="isEvaluated">
                <div class="p-4 rounded-2xl text-center animate-in fade-in zoom-in duration-300" :class="feedbackClass">
                    <p class="font-bold text-lg" x-text="feedbackMsg"></p>
                    <p class="text-sm opacity-80 mt-1">Correct answer: <span class="underline" x-text="currentCard.back"></span></p>
                </div>
            </template>

            <button 
                @click="isEvaluated ? nextCard() : checkAnswer()"
                class="w-full py-4 rounded-2xl font-black text-lg transition-transform active:scale-95 shadow-xl"
                :class="isEvaluated ? 'bg-slate-700 hover:bg-slate-600' : 'bg-blue-600 hover:bg-blue-500'"
                x-text="isEvaluated ? 'Continue' : 'Check Answer'"
            ></button>
        </div>

        <div class="mt-10 p-4 bg-slate-900/50 rounded-2xl border border-slate-700">
            <p class="text-[10px] font-bold text-slate-500 uppercase mb-3 text-center">Add New Card</p>
            <div class="flex flex-col gap-2">
                <input type="text" x-model="newFront" placeholder="Question" class="bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm focus:border-blue-500 outline-none">
                <input type="text" x-model="newBack" placeholder="Answer" class="bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm focus:border-blue-500 outline-none">
                <button @click="addCard()" class="bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg text-xs font-bold uppercase transition">Save Card</button>
            </div>
        </div>

        <div class="mt-8 pt-4 border-t border-slate-700 flex justify-between">
            <button @click="exportDeck()" class="text-xs text-slate-500 hover:text-blue-400">Share Deck (JSON)</button>
            <button @click="resetProgress()" class="text-xs text-slate-500 hover:text-red-400">Reset All</button>
        </div>
    </div>

    <script>
        function studyApp() {
            return {
                currentIndex: 0,
                userAnswer: '',
                isEvaluated: false,
                feedbackMsg: '',
                feedbackClass: '',
                xp: 0,
                newFront: '',
                newBack: '',
                cards: [
                    { category: 'Web', front: "What does HTML stand for?", back: "HyperText Markup Language" },
                    { category: 'Web', front: "What does CSS stand for?", back: "Cascading Style Sheets" },
                    { category: 'Dev', front: "What is the command to create a new branch in Git?", back: "git branch" },
                    { category: 'JS', front: "What operator is used for strict equality?", back: "===" }
                ],
                get currentCard() { return this.cards[this.currentIndex]; },

                init() {
                    const savedXp = localStorage.getItem('smart_study_xp');
                    const savedCards = localStorage.getItem('smart_study_cards');
                    if (savedXp) this.xp = parseInt(savedXp);
                    if (savedCards) this.cards = JSON.parse(savedCards);
                },

                normalize(str) {
                    return str.toLowerCase().replace(/[^a-z0-9]/g, '');
                },

                checkAnswer() {
                    if(!this.userAnswer.trim()) return;
                    const actual = this.normalize(this.currentCard.back);
                    const input = this.normalize(this.userAnswer);

                    if (input === actual || (input.length > 3 && actual.includes(input))) {
                        this.feedbackMsg = "Correct! 🎯";
                        this.feedbackClass = "bg-emerald-500/20 text-emerald-400 border-2 border-emerald-500/50";
                        this.xp += 20;
                    } else {
                        this.feedbackMsg = "Almost! 🔍";
                        this.feedbackClass = "bg-red-500/20 text-red-400 border-2 border-red-500/50";
                    }
                    this.isEvaluated = true;
                    localStorage.setItem('smart_study_xp', this.xp);
                },

                nextCard() {
                    this.isEvaluated = false;
                    this.userAnswer = '';
                    this.feedbackClass = '';
                    this.currentIndex = (this.currentIndex + 1) % this.cards.length;
                },

                addCard() {
                    if(!this.newFront || !this.newBack) return;
                    this.cards.push({ category: 'User', front: this.newFront, back: this.newBack });
                    localStorage.setItem('smart_study_cards', JSON.stringify(this.cards));
                    this.newFront = ''; this.newBack = '';
                    alert('Card Added!');
                },

                exportDeck() {
                    navigator.clipboard.writeText(JSON.stringify(this.cards));
                    alert("JSON copied!");
                },

                resetProgress() {
                    if(confirm("Erase everything?")) {
                        localStorage.clear();
                        location.reload();
                    }
                }
            }
        }
    </script>
</body>
</html>
